name: Build Sam APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger bhi kar sakte ho

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Code checkout ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js setup ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Java setup (Android ke liye) ───────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Frontend dependencies + build ──────────────
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Build React app
        run: |
          cd frontend
          REACT_APP_API_URL=${{ secrets.API_URL }} npm run build

      # ── 5. Capacitor sync ─────────────────────────────
      - name: Capacitor sync
        run: |
          cd frontend
          npx cap sync android

      # ── 6. Android SDK setup ──────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Gradle permissions ─────────────────────────
      - name: Make gradlew executable
        run: chmod +x frontend/android/gradlew

      # ── 8. APK build ──────────────────────────────────
      - name: Build Debug APK
        run: |
          cd frontend/android
          ./gradlew assembleDebug --no-daemon

      # ── 9. APK upload (download kar sako) ─────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sam-assistant-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
